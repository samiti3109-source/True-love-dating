<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>True Love</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #0d0d12;
      --card-bg: #181824;
      --border-color: #2a2a3a;
      --primary-color: #ff2a6d;
      --primary-grad: linear-gradient(135deg, #ff2a6d, #ff5e62);
      --text-color: #ffffff;
      --subtext-color: #aaa;
    }

    /* Themes */
    body.theme-purple {
      --bg-color: #0f0c1b;
      --card-bg: #1a1528;
      --border-color: #31284a;
      --primary-color: #8a2be2;
      --primary-grad: linear-gradient(135deg, #8a2be2, #4a00e0);
    }

    body.theme-ocean {
      --bg-color: #0a1118;
      --card-bg: #121d28;
      --border-color: #203246;
      --primary-color: #00d2ff;
      --primary-grad: linear-gradient(135deg, #00d2ff, #3a7bd5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
      transition: background 0.3s ease;
    }
    .header {
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    .logo { font-size: 18px; font-weight: bold; color: var(--primary-color); }
    
    .controls-top { display: flex; gap: 8px; align-items: center; }
    .top-btn {
      background: var(--card-bg); border: 1px solid var(--border-color);
      color: var(--text-color); padding: 4px 8px; border-radius: 6px;
      font-size: 12px; cursor: pointer;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      overflow-y: auto;
    }

    /* Swipe View */
    .profile-card {
      width: 100%;
      max-width: 340px;
      height: 380px;
      background: var(--card-bg);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85;
    }
    .card-info {
      position: relative; z-index: 2; padding: 20px;
      background: linear-gradient(to top, rgba(13,13,18,0.95), transparent);
    }
    .actions { display: flex; gap: 20px; margin-top: 15px; }
    .btn {
      width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    .btn-dislike { background: #252538; color: #ff4757; border: 2px solid #ff4757; }
    .btn-like { background: var(--primary-grad); color: white; }

    /* Forms */
    .form-container {
      width: 100%; max-width: 340px; display: none; flex-direction: column; gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; text-align: left; }
    label { font-size: 13px; color: var(--subtext-color); }
    input, textarea, select {
      background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px; color: var(--text-color);
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .save-btn {
      background: var(--primary-grad); color: white; border: none; padding: 12px;
      border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
    }

    /* Matches */
    .matches-container {
      width: 100%; max-width: 340px; display: none; flex-direction: column; gap: 10px;
    }
    .match-item {
      display: flex; align-items: center; gap: 12px; background: var(--card-bg);
      padding: 10px; border-radius: 12px; border: 1px solid var(--border-color);
    }
    .match-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    .match-chat-btn {
      margin-left: auto; background: var(--primary-color); color: white; border: none;
      padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }

    /* Nav Bar */
    .nav-bar {
      display: flex; justify-content: space-around; background: var(--card-bg);
      padding: 12px 0; border-top: 1px solid var(--border-color);
    }
    .nav-item { color: var(--subtext-color); font-size: 20px; cursor: pointer; text-align: center; }
    .nav-item.active { color: var(--primary-color); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">❤️ True Love</div>
    <div class="controls-top">
      <button class="top-btn" onclick="toggleLanguage()" id="lang-btn">🇪🇹 AM</button>
      <button class="top-btn" onclick="toggleTheme()">🎨 Theme</button>
    </div>
  </div>

  <!-- Main Content Container -->
  <div class="container">
    
    <!-- 1. SWIPE HOME VIEW -->
    <div id="swipe-view" style="display: flex; flex-direction: column; align-items: center;">
      <div class="profile-card">
        <img id="profile-img" class="card-img" src="" alt="Profile">
        <div class="card-info">
          <div style="font-size: 22px; font-weight: bold;" id="card-name"></div>
          <div style="font-size: 13px; color: var(--primary-color); margin-top: 2px;" id="card-religion-zodiac"></div>
          <div style="font-size: 13px; color: var(--subtext-color); margin-top: 4px;" id="card-bio"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-dislike" onclick="nextProfile('pass')">✖</button>
        <button class="btn btn-like" onclick="nextProfile('like')">❤️</button>
      </div>
    </div>

    <!-- 2. MATCHES & CHAT VIEW -->
    <div id="matches-view" class="matches-container">
      <h3 style="margin-bottom: 10px;" id="txt-matches-title">የተወደዱ ፕሮፋይሎች (Matches)</h3>
      <div id="matches-list"></div>
    </div>

    <!-- 3. MY PROFILE EDIT VIEW -->
    <div id="profile-view" class="form-container">
      <h3 style="margin-bottom: 10px;" id="txt-edit-title">ፕሮፋይል አስተካክል</h3>
      <div class="form-group">
        <label id="lbl-name">ስም</label>
        <input type="text" id="my-input-name" placeholder="ስምህን አስገባ">
      </div>
      <div class="form-group">
        <label id="lbl-age">ዕድሜ</label>
        <input type="number" id="my-input-age" placeholder="22">
      </div>
      <div class="form-group">
        <label id="lbl-religion">ሃይማኖት</label>
        <select id="my-input-religion">
          <option value="ኦርቶዶክስ">ኦርቶዶክስ</option>
          <option value="ሙስሊም">ሙስሊም</option>
          <option value="ፕሮቴስታንት">ፕሮቴስታንት</option>
          <option value="ሌላ">ሌላ</option>
        </select>
      </div>
      <div class="form-group">
        <label id="lbl-bio">ስለ እኔ (Bio)</label>
        <textarea id="my-input-bio" rows="3" placeholder="ስለራስህ በጥቂቱ..."></textarea>
      </div>
      <button class="save-btn" id="btn-save" onclick="saveMyProfile()">ሴቭ አድርግ</button>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🔥</div>
    <div class="nav-item" id="nav-matches" onclick="switchTab('matches')">💬</div>
    <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">👤</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Translations
    const translations = {
      am: {
        matchesTitle: "የተወደዱ ፕሮፋይሎች (Matches)",
        editTitle: "ፕሮፋይል አስተካክል",
        lblName: "ስም",
        lblAge: "ዕድሜ",
        lblReligion: "ሃይማኖት",
        lblBio: "ስለ እኔ (Bio)",
        btnSave: "ሴቭ አድርግ",
        noMatches: "እስካሁን ምንም የተወደደ ፕሮፋይል የለም",
        matchAlert: "ከ {name} ጋር ተወዳዳችኋል! 🎉\nመልእክት ለመላክ የ 💬 ምልክቷን ይጫኑ።"
      },
      en: {
        matchesTitle: "Your Matches",
        editTitle: "Edit Profile",
        lblName: "Name",
        lblAge: "Age",
        lblReligion: "Religion",
        lblBio: "About Me (Bio)",
        btnSave: "Save Profile",
        noMatches: "No matches found yet",
        matchAlert: "You matched with {name}! 🎉\nClick 💬 to chat."
      }
    };

    let currentLang = localStorage.getItem('app_lang') || 'am';
    let themes = ['', 'theme-purple', 'theme-ocean'];
    let currentThemeIdx = parseInt(localStorage.getItem('app_theme_idx') || '0');

    // Dummy Profiles List
    const profiles = [
      { id: 1, name: "ሀና፣ 22", bio: "አዲስ ሰዎችን ማወቅ እና ካፌዎችን መጎብኘት እወዳለሁ ☕✨", religion: "ኦርቶዶክስ", zodiac: "Aries", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500", username: "telegram" },
      { id: 2, name: "ዮናስ፣ 25", bio: "የቴክኖሎጂ እና የሙዚቃ አፍቃሪ 🎧💻", religion: "ፕሮቴስታንት", zodiac: "Leo", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500", username: "telegram" },
      { id: 3, name: "ሰላም፣ 21", bio: "መጽሐፍ ማንበብ እና ጉዞ ደስታዬ ነው 📚✈️", religion: "ሙስሊም", zodiac: "Virgo", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", username: "telegram" }
    ];

    let currentIndex = 0;
    let myMatches = [];

    function applyLanguage() {
      const t = translations[currentLang];
      document.getElementById('lang-btn').innerText = currentLang === 'am' ? "🇪🇹 AM" : "🇬🇧 EN";
      document.getElementById('txt-matches-title').innerText = t.matchesTitle;
      document.getElementById('txt-edit-title').innerText = t.editTitle;
      document.getElementById('lbl-name').innerText = t.lblName;
      document.getElementById('lbl-age').innerText = t.lblAge;
      document.getElementById('lbl-religion').innerText = t.lblReligion;
      document.getElementById('lbl-bio').innerText = t.lblBio;
      document.getElementById('btn-save').innerText = t.btnSave;
      renderMatches();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'am' ? 'en' : 'am';
      localStorage.setItem('app_lang', currentLang);
      applyLanguage();
    }

    function applyTheme() {
      document.body.className = themes[currentThemeIdx];
    }

    function toggleTheme() {
      currentThemeIdx = (currentThemeIdx + 1) % themes.length;
      localStorage.setItem('app_theme_idx', currentThemeIdx);
      applyTheme();
    }

    function renderProfile() {
      const p = profiles[currentIndex];
      document.getElementById('profile-img').src = p.img;
      document.getElementById('card-name').innerText = p.name;
      document.getElementById('card-religion-zodiac').innerText = `☦️ ${p.religion} | 🌟 ${p.zodiac}`;
      document.getElementById('card-bio').innerText = p.bio;
    }

    function nextProfile(action) {
      if (action === 'like') {
        tg.HapticFeedback?.impactOccurred('medium');
        const likedProfile = profiles[currentIndex];
        
        if (!myMatches.some(m => m.id === likedProfile.id)) {
          myMatches.push(likedProfile);
          renderMatches();
        }
        
        const msg = translations[currentLang].matchAlert.replace('{name}', likedProfile.name);
        tg.showAlert(msg);
      }
      currentIndex = (currentIndex + 1) % profiles.length;
      renderProfile();
    }

    function renderMatches() {
      const listContainer = document.getElementById('matches-list');
      const t = translations[currentLang];
      
      if (myMatches.length === 0) {
        listContainer.innerHTML = `<p style="color:var(--subtext-color); font-size:13px; text-align:center; margin-top:20px;">${t.noMatches}</p>`;
        return;
      }

      listContainer.innerHTML = '';
      myMatches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'match-item';
        item.innerHTML = `
          <img src="${m.img}" class="match-img" alt="user">
          <div>
            <div style="font-weight:bold; font-size:14px;">${m.name}</div>
            <div style="font-size:11px; color:var(--subtext-color);">${m.religion}</div>
          </div>
          <button class="match-chat-btn" onclick="openChat('${m.username}')">Chat 💬</button>
        `;
        listContainer.appendChild(item);
      });
    }

    function openChat(username) {
      if (username) {
        tg.openTelegramLink(`https://t.me/${username}`);
      }
    }

    function switchTab(tab) {
      const swipeView = document.getElementById('swipe-view');
      const matchesView = document.getElementById('matches-view');
      const profileView = document.getElementById('profile-view');
      
      const navHome = document.getElementById('nav-home');
      const navMatches = document.getElementById('nav-matches');
      const navProfile = document.getElementById('nav-profile');

      swipeView.style.display = 'none';
      matchesView.style.display = 'none';
      profileView.style.display = 'none';

      navHome.classList.remove('active');
      navMatches.classList.remove('active');
      navProfile.classList.remove('active');

      if (tab === 'home') {
        swipeView.style.display = 'flex';
        navHome.classList.add('active');
      } else if (tab === 'matches') {
        matchesView.style.display = 'flex';
        navMatches.classList.add('active');
      } else if (tab === 'profile') {
        profileView.style.display = 'flex';
        navProfile.classList.add('active');
      }
    }

    function saveMyProfile() {
      const name = document.getElementById('my-input-name').value;
      const age = document.getElementById('my-input-age').value;
      const religion = document.getElementById('my-input-religion').value;
      const bio = document.getElementById('my-input-bio').value;

      if (!name || !age) {
        tg.showAlert("Please fill name and age!");
        return;
      }

      localStorage.setItem('user_profile', JSON.stringify({ name, age, religion, bio }));
      tg.showAlert("Saved! 🎉");
      switchTab('home');
    }

    function loadMyProfile() {
      const saved = localStorage.getItem('user_profile');
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('my-input-name').value = data.name || '';
        document.getElementById('my-input-age').value = data.age || '';
        document.getElementById('my-input-religion').value = data.religion || 'ኦርቶዶክስ';
        document.getElementById('my-input-bio').value = data.bio || '';
      }
    }

    // Init
    applyLanguage();
    applyTheme();
    renderProfile();
    loadMyProfile();
  </script>
</body>
  </html>
