<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>True Love</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0d0d12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
    }
    .header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a24;
    }
    .logo { font-size: 20px; font-weight: bold; color: #ff2a6d; }
    
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      overflow-y: auto;
    }

    /* Swipe View */
    .profile-card {
      width: 100%;
      max-width: 340px;
      height: 380px;
      background: #181824;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid #2a2a3a;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85;
    }
    .card-info {
      position: relative; z-index: 2; padding: 20px;
      background: linear-gradient(to top, rgba(13,13,18,0.95), transparent);
    }
    .actions { display: flex; gap: 20px; margin-top: 15px; }
    .btn {
      width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .btn-dislike { background: #252538; color: #ff4757; border: 2px solid #ff4757; }
    .btn-like { background: linear-gradient(135deg, #ff2a6d, #ff5e62); color: white; }

    /* Profile Edit Form View */
    .form-container {
      width: 100%; max-width: 340px; display: none; flex-direction: column; gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; text-align: left; }
    label { font-size: 13px; color: #aaa; }
    input, textarea {
      background: #181824; border: 1px solid #2a2a3a; padding: 10px; color: white;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .save-btn {
      background: #ff2a6d; color: white; border: none; padding: 12px;
      border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
    }

    /* Matches List */
    .matches-container {
      width: 100%; max-width: 340px; display: none; flex-direction: column; gap: 10px;
    }
    .match-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #181824; padding: 10px 15px; border-radius: 12px; border: 1px solid #2a2a3a;
    }
    .match-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
    .chat-btn {
      background: #0088cc; color: white; border: none; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none;
    }

    /* Bottom Navigation Bar */
    .nav-bar {
      display: flex; justify-content: space-around; background: #12121a;
      padding: 12px 0; border-top: 1px solid #1a1a24;
    }
    .nav-item { color: #666; font-size: 20px; cursor: pointer; text-align: center; }
    .nav-item.active { color: #ff2a6d; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">❤️ True Love</div>
    <div id="user-display" style="font-size: 13px; color: #888;"></div>
  </div>

  <!-- Main Content Container -->
  <div class="container">
    
    <!-- 1. SWIPE HOME VIEW -->
    <div id="swipe-view" style="display: flex; flex-direction: column; align-items: center;">
      <div class="profile-card">
        <img id="profile-img" class="card-img" src="" alt="Profile">
        <div class="card-info">
          <div style="font-size: 22px; font-weight: bold;" id="card-name"></div>
          <div style="font-size: 13px; color: #ccc; margin-top: 4px;" id="card-bio"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-dislike" onclick="nextProfile('pass')">✖</button>
        <button class="btn btn-like" onclick="nextProfile('like')">❤️</button>
      </div>
    </div>

    <!-- 2. MATCHES VIEW -->
    <div id="matches-view" class="matches-container">
      <h3 style="margin-bottom: 10px;">የእርስዎ Matches ❤️</h3>
      <div id="matches-list" style="display: flex; flex-direction: column; gap: 10px;">
        <p style="color: #666; font-size: 13px;">እስካሁን ምንም Match የለም። ሰዎችን Like ያድርጉ!</p>
      </div>
    </div>

    <!-- 3. MY PROFILE EDIT VIEW -->
    <div id="profile-view" class="form-container">
      <h3 style="margin-bottom: 10px;">ፕሮፋይል አስተካክል</h3>
      <div class="form-group">
        <label>ስም</label>
        <input type="text" id="my-input-name" placeholder="ስምህን አስገባ">
      </div>
      <div class="form-group">
        <label>ዕድሜ</label>
        <input type="number" id="my-input-age" placeholder="22">
      </div>
      <div class="form-group">
        <label>ስለ እኔ (Bio)</label>
        <textarea id="my-input-bio" rows="3" placeholder="ስለራስህ በጥቂቱ..."></textarea>
      </div>
      <button class="save-btn" onclick="saveMyProfile()">ሴቭ አድርግ</button>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🔥</div>
    <div class="nav-item" id="nav-matches" onclick="switchTab('matches')">💬</div>
    <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">👤</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const tgUser = tg.initDataUnsafe?.user;
    if (tgUser) {
      document.getElementById('user-display').innerText = tgUser.first_name;
    }

    const profiles = [
      { id: 1, name: "ሀና፣ 22", bio: "አዲስ ሰዎችን ማወቅ እና ካፌዎችን መጎብኘት እወዳለሁ ☕✨", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500", username: "telegram" },
      { id: 2, name: "ዮናስ፣ 25", bio: "የቴክኖሎጂ እና የሙዚቃ አፍቃሪ 🎧💻", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500", username: "telegram" },
      { id: 3, name: "ሰላም፣ 21", bio: "መጽሐፍ ማንበብ እና ጉዞ ደስታዬ ነው 📚✈️", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", username: "telegram" }
    ];

    let currentIndex = 0;
    let myMatches = [];

    function renderProfile() {
      const p = profiles[currentIndex];
      document.getElementById('profile-img').src = p.img;
      document.getElementById('card-name').innerText = p.name;
      document.getElementById('card-bio').innerText = p.bio;
    }

    function nextProfile(action) {
      if (action === 'like') {
        tg.HapticFeedback?.impactOccurred('medium');
        const currentPerson = profiles[currentIndex];
        
        // Add to matches if not already added
        if (!myMatches.some(m => m.id === currentPerson.id)) {
          myMatches.push(currentPerson);
          updateMatchesUI();
          tg.showAlert(`🎉 It's a Match! ከ ${currentPerson.name.split('፣')[0]} ጋር ተጣመዳችኋል!`);
        }
      }
      currentIndex = (currentIndex + 1) % profiles.length;
      renderProfile();
    }

    function updateMatchesUI() {
      const listEl = document.getElementById('matches-list');
      if (myMatches.length === 0) return;

      listEl.innerHTML = myMatches.map(m => `
        <div class="match-item">
          <div style="display:flex; align-items:center; gap:10px;">
            <img class="match-avatar" src="${m.img}">
            <div>
              <div style="font-size:14px; font-weight:bold;">${m.name}</div>
              <div style="font-size:11px; color:#aaa;">Match ሆናችኋል!</div>
            </div>
          </div>
          <button class="chat-btn" onclick="openChat('${m.username}')">Chat 💬</button>
        </div>
      `).join('');
    }

    function openChat(username) {
      tg.openTelegramLink(`https://t.me/${username}`);
    }

    function switchTab(tab) {
      document.getElementById('swipe-view').style.display = tab === 'home' ? 'flex' : 'none';
      document.getElementById('matches-view').style.display = tab === 'matches' ? 'flex' : 'none';
      document.getElementById('profile-view').style.display = tab === 'profile' ? 'flex' : 'none';

      document.getElementById('nav-home').classList.toggle('active', tab === 'home');
      document.getElementById('nav-matches').classList.toggle('active', tab === 'matches');
      document.getElementById('profile-view').classList.toggle('active', tab === 'profile');
    }

    function saveMyProfile() {
      const name = document.getElementById('my-input-name').value;
      const age = document.getElementById('my-input-age').value;
      const bio = document.getElementById('my-input-bio').value;

      if (!name || !age) {
        tg.showAlert("እባክዎን ስም እና ዕድሜ ያስገቡ!");
        return;
      }

      localStorage.setItem('user_profile', JSON.stringify({ name, age, bio }));
      tg.showAlert("ፕሮፋይልህ በትክክል ተመዝግቧል! 🎉");
      switchTab('home');
    }

    function loadMyProfile() {
      const saved = localStorage.getItem('user_profile');
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('my-input-name').value = data.name || '';
        document.getElementById('my-input-age').value = data.age || '';
        document.getElementById('my-input-bio').value = data.bio || '';
      } else if (tgUser) {
        document.getElementById('my-input-name').value = tgUser.first_name || '';
      }
    }

    renderProfile();
    loadMyProfile();
  </script>
</body>
  </html>
